  siteId: ID!
  number: Int!
  slug: String!
  visibility: String!
  order: Int!
  name: String!
  description: String
  categories: [DocsCategory!]!
  articles: [DocsArticle!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""A category grouping within a Docs collection."""
type DocsCategory {
  id: ID!
  collectionId: ID!
  number: Int!
  slug: String!
  visibility: String!
  order: Int!
  name: String!
  articles: [DocsArticle!]!
