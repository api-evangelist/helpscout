# ---------------------------------------------------------------------------
# Webhooks
# ---------------------------------------------------------------------------

"""A registered Help Scout webhook subscription."""
type Webhook {
  id: ID!
  url: URL!
  events: [WebhookEventType!]!
  secret: String
  status: String!
