# ---------------------------------------------------------------------------
# Auth
# ---------------------------------------------------------------------------

"""An API key credential for accessing the Help Scout API."""
type APIKey {
  id: ID!
  name: String!
  createdAt: DateTime!
  lastUsedAt: DateTime
}

"""An OAuth 2.0 access token."""
type Token {
  accessToken: String!
  tokenType: String!
  expiresIn: Int!
  scope: String
}

"""An OAuth 2.0 application registered with Help Scout."""
type OAuthApp {
  id: ID!
  name: String!
  clientId: String!
  redirectUri: URL
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ---------------------------------------------------------------------------
# Query
# ---------------------------------------------------------------------------

type Query {
  """List all mailboxes accessible by the authenticated user."""
  mailboxes(page: Int, size: Int): [Mailbox!]!

  """Get details for a specific mailbox."""
  mailbox(id: ID!): MailboxDetails

  """List folders in a mailbox."""
  folders(mailboxId: ID!): [Folder!]!

  """List conversations with optional filters."""
  conversations(
    mailboxId: ID
    status: ConversationStatus
    assignedTo: ID
    folderId: ID
    tag: String
    customerId: ID
    query: String
    page: Int
    size: Int
  ): ConversationConnection!

  """Get a single conversation by ID."""
  conversation(id: ID!): ConversationDetails

  """List threads for a conversation."""
  threads(conversationId: ID!): [Thread!]!

  """List customers."""
  customers(
    mailboxId: ID
    query: String
    page: Int
    size: Int
  ): CustomerConnection!

  """Get a single customer by ID."""
  customer(id: ID!): CustomerDetails

  """List all tags."""
  tags: [TagDetails!]!

  """List users (agents)."""
  users(page: Int, size: Int): UserConnection!

  """Get a single user by ID."""
  user(id: ID!): UserDetails

  """List teams."""
  teams(page: Int, size: Int): [Team!]!

  """Get a single team by ID."""
  team(id: ID!): TeamDetails

  """List automation workflows for a mailbox."""
  workflows(mailboxId: ID!): [WorkflowDetails!]!

  """Get saved / reply templates for a mailbox."""
  replyTemplates(mailboxId: ID!): [ReplyTemplate!]!

  """List saved searches."""
  savedSearches: [SavedSearch!]!

  """List custom properties defined at account level."""
  customProperties: [CustomProperty!]!

  """Get a conversation report."""
  conversationReport(
    type: ReportType!
    startDate: DateTime!
    endDate: DateTime!
    mailboxIds: [ID!]
    tags: [String!]
    types: [ConversationType!]
  ): ConversationReport

  """Get a happiness / CSAT report."""
  happinessReport(
    startDate: DateTime!
    endDate: DateTime!
    mailboxIds: [ID!]
  ): HappinessReport

  """Get a productivity report."""
  productivityReport(
    startDate: DateTime!
    endDate: DateTime!
    mailboxIds: [ID!]
  ): ProductivityReport

  """List Docs sites."""
  docsSites: [DocsSite!]!

  """Get a Docs site."""
  docsSite(id: ID!): DocsSite

  """List collections in a Docs site."""
  docsCollections(siteId: ID!): [DocsCollection!]!

  """Get a Docs collection."""
  docsCollection(id: ID!): DocsCollection

  """List categories in a Docs collection."""
  docsCategories(collectionId: ID!): [DocsCategory!]!

  """List articles, optionally filtered."""
  docsArticles(
    collectionId: ID
    categoryId: ID
    status: String
    page: Int
    size: Int
  ): [DocsArticle!]!

  """Get a Docs article."""
  docsArticle(id: ID!): DocsArticle

  """Search Docs articles."""
  docsSearch(
    query: String!
    siteId: ID
    collectionId: ID
    page: Int
    size: Int
  ): [DocsSearchResult!]!

  """List Beacons."""
  beacons: [Beacon!]!

  """Get a Beacon."""
  beacon(id: ID!): BeaconDetails

  """List registered webhooks."""
  webhooks: [Webhook!]!

  """Get a single webhook."""
  webhook(id: ID!): Webhook

  """List ratings for a date range."""
  ratings(
    startDate: DateTime!
    endDate: DateTime!
    mailboxIds: [ID!]
    rating: RatingStar
    page: Int
    size: Int
  ): [Rating!]!
}

# ---------------------------------------------------------------------------
# Mutation
# ---------------------------------------------------------------------------

type Mutation {
  """Create a new conversation."""
  createConversation(input: CreateConversationInput!): ConversationDetails!

  """Update status, assignee, subject, or tags on a conversation."""
  updateConversation(id: ID!, input: UpdateConversationInput!): ConversationDetails!

  """Delete a conversation."""
  deleteConversation(id: ID!): Boolean!

  """Add a thread (reply, note, phone, chat) to a conversation."""
  createThread(conversationId: ID!, input: CreateThreadInput!): Thread!

  """Update custom field values on a conversation."""
  updateConversationCustomFields(
    conversationId: ID!
    fields: [ConversationCustomFieldInput!]!
  ): [ConversationCustomField!]!

  """Create a new customer."""
  createCustomer(input: CreateCustomerInput!): CustomerDetails!

  """Update a customer."""
  updateCustomer(id: ID!, input: UpdateCustomerInput!): CustomerDetails!

  """Add an email to a customer."""
  addCustomerEmail(customerId: ID!, email: String!, type: String): CustomerEmail!

  """Create a new tag."""
  createTag(name: String!, color: String): TagDetails!

  """Update a tag."""
  updateTag(id: ID!, name: String, color: String): TagDetails!

  """Delete a tag."""
  deleteTag(id: ID!): Boolean!

  """Trigger a workflow against a conversation."""
  runWorkflow(workflowId: ID!, conversationId: ID!): Boolean!

  """Create a reply template."""
  createReplyTemplate(input: CreateReplyTemplateInput!): ReplyTemplate!

  """Update a reply template."""
  updateReplyTemplate(id: ID!, input: UpdateReplyTemplateInput!): ReplyTemplate!

  """Delete a reply template."""
  deleteReplyTemplate(id: ID!): Boolean!

  """Create a Docs article."""
  createDocsArticle(input: CreateDocsArticleInput!): DocsArticle!

  """Update a Docs article."""
  updateDocsArticle(id: ID!, input: UpdateDocsArticleInput!): DocsArticle!

  """Delete a Docs article."""
  deleteDocsArticle(id: ID!): Boolean!

  """Create a Docs collection."""
  createDocsCollection(siteId: ID!, name: String!, description: String): DocsCollection!

  """Create a Docs category."""
  createDocsCategory(collectionId: ID!, name: String!): DocsCategory!

  """Register a webhook."""
  createWebhook(url: URL!, events: [WebhookEventType!]!, secret: String): Webhook!

  """Update a webhook."""
  updateWebhook(id: ID!, url: URL, events: [WebhookEventType!], secret: String): Webhook!

  """Delete a webhook."""
  deleteWebhook(id: ID!): Boolean!

  """Upload an attachment and return the result."""
  uploadAttachment(
    conversationId: ID!
    threadId: ID!
    filename: String!
    mimeType: String!
    data: String!
  ): Attachment!

  """Delete an attachment."""
  deleteAttachment(id: ID!): Boolean!
}

# ---------------------------------------------------------------------------
# Input Types
# ---------------------------------------------------------------------------

input CreateConversationInput {
  subject: String!
  mailboxId: ID!
  type: ConversationType!
  status: ConversationStatus
  assignTo: ID
  tags: [String!]
  customFields: [ConversationCustomFieldInput!]
  customer: CustomerRefInput!
  threads: [CreateThreadInput!]
}

input UpdateConversationInput {
  subject: String
  status: ConversationStatus
  assignTo: ID
  mailboxId: ID
  tags: [String!]
  snoozedUntil: DateTime
}

input CreateThreadInput {
  type: ThreadType!
  body: String!
  to: [String!]
  cc: [String!]
  bcc: [String!]
  attachments: [AttachmentInput!]
  savedReplyId: ID
}

input ConversationCustomFieldInput {
  fieldId: ID!
  value: String
}

input CreateCustomerInput {
  firstName: String
  lastName: String
  email: String
  phone: String
  organization: String
  jobTitle: String
  background: String
  location: String
}

input UpdateCustomerInput {
  firstName: String
  lastName: String
  organization: String
  jobTitle: String
  background: String
  location: String
  timeZone: String
}

input CustomerRefInput {
  id: ID
  email: String
}

input AttachmentInput {
  filename: String!
  mimeType: String!
  data: String!
}

input CreateReplyTemplateInput {
  mailboxId: ID!
  name: String!
  subject: String
  body: String!
}

input UpdateReplyTemplateInput {
  name: String
  subject: String
  body: String
}

input CreateDocsArticleInput {
  collectionId: ID!
  name: String!
  text: String!
  status: String
  featured: Boolean
  keywords: [String!]
  categories: [ID!]
}

input UpdateDocsArticleInput {
  name: String
  text: String
  status: String
  featured: Boolean
  keywords: [String!]
  categories: [ID!]
}
