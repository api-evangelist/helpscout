naftiko: 1.0.0-alpha2
info:
  label: Help Scout Mailbox API — Teams
  description: 'Help Scout Mailbox API — Teams. 1 operations. Lead operation: List teams. Self-contained Naftiko capability
    covering one Helpscout business surface.'
  tags:
  - Helpscout
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HELPSCOUT_API_KEY: HELPSCOUT_API_KEY
capability:
  consumes:
  - type: http
    namespace: helpscout-teams
    baseUri: https://api.helpscout.net/v2
    description: Help Scout Mailbox API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: teams
      path: /teams
      operations:
      - name: listteams
        method: GET
        description: List teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.HELPSCOUT_API_KEY}}'
  exposes:
  - type: rest
    namespace: helpscout-teams-rest
    port: 8080
    description: REST adapter for Help Scout Mailbox API — Teams. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/teams
      name: teams
      description: REST surface for teams.
      operations:
      - method: GET
        name: listteams
        description: List teams
        call: helpscout-teams.listteams
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: helpscout-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Help Scout Mailbox API — Teams. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-teams
      description: List teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: helpscout-teams.listteams
      outputParameters:
      - type: object
        mapping: $.
