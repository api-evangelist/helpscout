      operations:
      - name: getconversation
        method: GET
        description: Get conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
      - name: updateconversation
        method: PATCH
        description: Update conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
