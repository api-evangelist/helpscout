    resources:
    - path: /v1/conversations
      name: conversations
      description: REST surface for conversations.
      operations:
      - method: GET
        name: listconversations
        description: List conversations
        call: helpscout-conversations.listconversations
        with:
          page: rest.page
          status: rest.status
        outputParameters:
